<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GasPulse – Smart Gas Monitoring</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0f1e;
    --bg2: #0f1629;
    --bg3: #141d35;
    --surface: #1a2540;
    --surface2: #1f2d4a;
    --border: rgba(99,179,237,0.12);
    --border2: rgba(99,179,237,0.22);
    --green: #22d07a;
    --green2: #16a85f;
    --green-glow: rgba(34,208,122,0.18);
    --blue: #4fa3f7;
    --blue2: #2d7dd2;
    --blue-glow: rgba(79,163,247,0.18);
    --orange: #f97316;
    --orange2: #ea6c10;
    --orange-glow: rgba(249,115,22,0.18);
    --red: #f25f5c;
    --text: #e8f0fe;
    --text2: #8fa3c8;
    --text3: #5a7299;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --r: 16px;
    --r2: 12px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --shadow2: 0 2px 12px rgba(0,0,0,0.3);
  }

  .light {
    --bg: #f0f4ff;
    --bg2: #e8eef8;
    --bg3: #dde6f4;
    --surface: #ffffff;
    --surface2: #f5f8ff;
    --border: rgba(45,125,210,0.15);
    --border2: rgba(45,125,210,0.28);
    --text: #0f1629;
    --text2: #3d5278;
    --text3: #7a9bc4;
    --shadow: 0 8px 32px rgba(79,123,200,0.12);
    --shadow2: 0 2px 12px rgba(79,123,200,0.1);
    --green-glow: rgba(34,208,122,0.1);
    --blue-glow: rgba(79,163,247,0.1);
    --orange-glow: rgba(249,115,22,0.1);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
    overflow-x: hidden;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

  /* ANIMATIONS */
  @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes glow { 0%,100%{box-shadow:0 0 20px var(--green-glow);} 50%{box-shadow:0 0 40px var(--green-glow), 0 0 60px var(--green-glow);} }
  @keyframes slideIn { from{transform:translateX(-100%);opacity:0;} to{transform:translateX(0);opacity:1;} }
  @keyframes countUp { from{opacity:0;transform:scale(0.8);} to{opacity:1;transform:scale(1);} }
  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
  @keyframes ripple { 0%{transform:scale(0);opacity:0.6;} 100%{transform:scale(4);opacity:0;} }
  @keyframes floatDot { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }

  .fade-up { animation: fadeUp 0.5s ease both; }
  .fade-up-1 { animation-delay: 0.05s; }
  .fade-up-2 { animation-delay: 0.1s; }
  .fade-up-3 { animation-delay: 0.15s; }
  .fade-up-4 { animation-delay: 0.2s; }
  .fade-up-5 { animation-delay: 0.25s; }

  /* ───── LOGIN ───── */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }

  .login-bg {
    position: absolute; inset: 0; pointer-events: none; overflow: hidden;
  }
  .login-bg-orb {
    position: absolute; border-radius: 50%; filter: blur(80px);
  }
  .orb1 { width:500px;height:500px;background:rgba(34,208,122,0.08);top:-100px;left:-100px; }
  .orb2 { width:400px;height:400px;background:rgba(79,163,247,0.08);bottom:-80px;right:-80px; }
  .orb3 { width:300px;height:300px;background:rgba(249,115,22,0.06);top:40%;right:20%; }

  .login-grid-bg {
    position: absolute; inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px),
                      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.5;
  }

  .login-card {
    position: relative; z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 24px;
    padding: 48px;
    width: 100%;
    max-width: 440px;
    box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.05);
    animation: fadeUp 0.6s ease;
  }

  .login-logo {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 32px;
  }
  .login-logo-icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--green), var(--blue2));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    animation: glow 3s ease infinite;
    flex-shrink: 0;
  }
  .login-logo-text { font-family: var(--font-head); font-size: 22px; font-weight: 800; }
  .login-logo-sub { font-size: 11px; color: var(--text2); letter-spacing: 0.1em; text-transform: uppercase; }

  .login-title { font-family: var(--font-head); font-size: 28px; font-weight: 700; margin-bottom: 6px; }
  .login-sub { color: var(--text2); margin-bottom: 32px; font-size: 14px; }

  .role-tabs {
    display: flex; gap: 8px; margin-bottom: 28px;
    background: var(--bg2);
    border-radius: 12px;
    padding: 4px;
  }
  .role-tab {
    flex: 1; padding: 10px; border: none; border-radius: 10px;
    font-family: var(--font-body); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.25s;
    color: var(--text2); background: transparent;
  }
  .role-tab.active {
    background: var(--surface); color: var(--text);
    box-shadow: var(--shadow2);
  }

  .form-group { margin-bottom: 18px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; display: block; }
  .form-input {
    width: 100%; padding: 14px 16px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--r2); color: var(--text);
    font-family: var(--font-body); font-size: 14px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }
  .form-input::placeholder { color: var(--text3); }

  .btn-primary {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--green2), var(--green));
    border: none; border-radius: var(--r2);
    color: #fff; font-family: var(--font-body); font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.25s;
    position: relative; overflow: hidden;
    letter-spacing: 0.02em;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(34,208,122,0.35); }
  .btn-primary:active { transform: translateY(0); }

  .login-hint {
    margin-top: 16px; padding: 12px 16px;
    background: var(--bg2); border-radius: var(--r2);
    font-size: 12px; color: var(--text2);
    border: 1px solid var(--border);
  }
  .login-hint strong { color: var(--text); }

  /* ───── APP SHELL ───── */
  .app-shell { display: flex; min-height: 100vh; }

  /* ───── SIDEBAR ───── */
  .sidebar {
    width: 260px; min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    position: fixed; left: 0; top: 0; bottom: 0; z-index: 100;
    transition: transform 0.3s ease, width 0.3s ease;
    overflow-y: auto; overflow-x: hidden;
  }
  .sidebar.collapsed { width: 72px; }
  .sidebar.mobile-hidden { transform: translateX(-100%); }

  .sidebar-header {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; background: var(--surface); z-index: 1;
    flex-shrink: 0;
  }
  .sidebar-logo-icon {
    width: 38px; height: 38px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--green), var(--blue2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .sidebar-logo-text { font-family: var(--font-head); font-size: 18px; font-weight: 800; white-space: nowrap; overflow: hidden; }
  .sidebar-logo-sub { font-size: 10px; color: var(--text2); letter-spacing: 0.1em; text-transform: uppercase; }

  .sidebar-section-title {
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text3); padding: 20px 20px 8px; white-space: nowrap; overflow: hidden;
  }
  .sidebar.collapsed .sidebar-section-title { opacity: 0; }

  .nav-item {
    display: flex; align-items: center; gap: 14px;
    padding: 11px 20px; margin: 2px 10px;
    border-radius: 10px; cursor: pointer;
    color: var(--text2); font-size: 14px; font-weight: 500;
    transition: all 0.2s; white-space: nowrap; overflow: hidden;
    border: none; background: transparent; width: calc(100% - 20px);
    text-align: left; position: relative;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: linear-gradient(135deg, rgba(34,208,122,0.15), rgba(79,163,247,0.1)); color: var(--green); }
  .nav-item.active::before {
    content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
    width: 3px; background: var(--green); border-radius: 0 3px 3px 0; margin-left: -10px;
  }
  .nav-icon { font-size: 18px; flex-shrink: 0; width: 22px; text-align: center; }
  .nav-label { flex: 1; }
  .nav-badge {
    font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 20px; background: var(--orange); color: #fff;
  }
  .sidebar.collapsed .nav-label, .sidebar.collapsed .nav-badge, .sidebar.collapsed .sidebar-logo-text, .sidebar.collapsed .sidebar-logo-sub { display: none; }
  .sidebar.collapsed .nav-item { padding: 11px 0; justify-content: center; width: 100%; margin: 2px 0; border-radius: 0; }
  .sidebar.collapsed .nav-item.active::before { left: 0; margin-left: 0; }

  .sidebar-footer {
    margin-top: auto; padding: 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .user-card {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 10px;
    background: var(--bg2); overflow: hidden;
  }
  .user-avatar {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--blue), var(--green));
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: #fff; flex-shrink: 0;
  }
  .user-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: var(--text2); text-transform: capitalize; }
  .sidebar.collapsed .user-card { padding: 8px; justify-content: center; }
  .sidebar.collapsed .user-info { display: none; }

  /* ───── MAIN CONTENT ───── */
  .main { margin-left: 260px; flex: 1; transition: margin-left 0.3s; min-width: 0; }
  .main.collapsed { margin-left: 72px; }

  .topbar {
    height: 64px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; position: sticky; top: 0; z-index: 50;
    gap: 16px;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }

  .icon-btn {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; transition: all 0.2s;
    flex-shrink: 0;
  }
  .icon-btn:hover { background: var(--bg3); transform: translateY(-1px); }

  .page-title { font-family: var(--font-head); font-size: 20px; font-weight: 700; }
  .page-subtitle { font-size: 12px; color: var(--text2); margin-top: 1px; }

  .notif-btn { position: relative; }
  .notif-dot {
    position: absolute; top: 6px; right: 6px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--orange); border: 2px solid var(--surface);
    animation: pulse 2s infinite;
  }

  .theme-btn { font-size: 18px; }

  /* ───── PAGE CONTENT ───── */
  .page { padding: 28px; animation: fadeIn 0.35s ease; }

  /* ───── STAT CARDS ───── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px; margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 24px;
    position: relative; overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: default;
  }
  .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
  .stat-card::after {
    content: ''; position: absolute;
    inset: 0; border-radius: var(--r);
    opacity: 0; transition: opacity 0.2s;
    background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.04), transparent 60%);
  }
  .stat-card:hover::after { opacity: 1; }

  .stat-accent {
    width: 48px; height: 48px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; margin-bottom: 16px;
  }
  .accent-green { background: var(--green-glow); }
  .accent-blue { background: var(--blue-glow); }
  .accent-orange { background: var(--orange-glow); }
  .accent-red { background: rgba(242,95,92,0.15); }

  .stat-label { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-family: var(--font-head); font-size: 32px; font-weight: 800; line-height: 1; margin-bottom: 8px; animation: countUp 0.5s ease; }
  .stat-change { font-size: 12px; display: flex; align-items: center; gap: 4px; }
  .stat-change.up { color: var(--green); }
  .stat-change.down { color: var(--red); }
  .stat-change.neutral { color: var(--text2); }

  .stat-glow-line {
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    border-radius: 0 0 var(--r) var(--r);
  }
  .glow-green { background: linear-gradient(90deg, transparent, var(--green), transparent); }
  .glow-blue { background: linear-gradient(90deg, transparent, var(--blue), transparent); }
  .glow-orange { background: linear-gradient(90deg, transparent, var(--orange), transparent); }

  /* ───── CARDS ───── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 24px;
    margin-bottom: 20px;
  }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 12px; }
  .card-title { font-family: var(--font-head); font-size: 16px; font-weight: 700; }
  .card-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
  @media(max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

  /* ───── STATUS BADGE ───── */
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
  }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
  .badge-paid { background: rgba(34,208,122,0.15); color: var(--green); }
  .badge-paid .badge-dot { background: var(--green); animation: pulse 2s infinite; }
  .badge-pending { background: var(--orange-glow); color: var(--orange); }
  .badge-pending .badge-dot { background: var(--orange); }
  .badge-overdue { background: rgba(242,95,92,0.15); color: var(--red); }
  .badge-overdue .badge-dot { background: var(--red); }
  .badge-high { background: var(--orange-glow); color: var(--orange); }
  .badge-normal { background: var(--green-glow); color: var(--green); }

  /* ───── TABLE ───── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; padding: 12px 16px;
    font-size: 11px; font-weight: 700;
    color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    font-size: 13px; color: var(--text2);
    transition: background 0.15s;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  td strong { color: var(--text); font-weight: 600; }

  /* ───── BUTTONS ───── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 20px; border-radius: 10px;
    font-family: var(--font-body); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; border: none;
    letter-spacing: 0.02em; position: relative; overflow: hidden;
  }
  .btn::after {
    content: ''; position: absolute;
    width: 20px; height: 20px; border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transform: scale(0); opacity: 0; transition: transform 0.4s, opacity 0.4s;
  }
  .btn:active::after { animation: ripple 0.4s ease; }

  .btn-green { background: linear-gradient(135deg, var(--green2), var(--green)); color: #fff; }
  .btn-green:hover { box-shadow: 0 6px 20px rgba(34,208,122,0.3); transform: translateY(-1px); }
  .btn-blue { background: linear-gradient(135deg, var(--blue2), var(--blue)); color: #fff; }
  .btn-blue:hover { box-shadow: 0 6px 20px rgba(79,163,247,0.3); transform: translateY(-1px); }
  .btn-orange { background: linear-gradient(135deg, var(--orange2), var(--orange)); color: #fff; }
  .btn-orange:hover { box-shadow: 0 6px 20px rgba(249,115,22,0.3); transform: translateY(-1px); }
  .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); background: var(--bg3); }
  .btn-sm { padding: 7px 14px; font-size: 12px; border-radius: 8px; }

  /* ───── USAGE METER ───── */
  .meter-wrap { margin: 20px 0; }
  .meter-label { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
  .meter-bar { height: 10px; background: var(--bg2); border-radius: 10px; overflow: hidden; }
  .meter-fill {
    height: 100%; border-radius: 10px;
    background: linear-gradient(90deg, var(--green2), var(--green));
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
    position: relative;
  }
  .meter-fill::after {
    content: '';
    position: absolute; right: 0; top: 0; bottom: 0;
    width: 60px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
    animation: shimmer 2s infinite;
  }
  .meter-fill.warning { background: linear-gradient(90deg, var(--orange2), var(--orange)); }
  .meter-fill.danger { background: linear-gradient(90deg, #e53e3e, var(--red)); }

  /* ───── ALERT BANNER ───── */
  .alert-banner {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px; border-radius: var(--r2);
    margin-bottom: 20px; border: 1px solid;
    animation: fadeUp 0.4s ease;
  }
  .alert-icon { font-size: 20px; flex-shrink: 0; }
  .alert-text { flex: 1; }
  .alert-title { font-weight: 600; font-size: 13px; }
  .alert-sub { font-size: 12px; margin-top: 2px; }
  .alert-warning { background: var(--orange-glow); border-color: rgba(249,115,22,0.3); color: var(--orange); }
  .alert-success { background: var(--green-glow); border-color: rgba(34,208,122,0.3); color: var(--green); }
  .alert-info { background: var(--blue-glow); border-color: rgba(79,163,247,0.3); color: var(--blue); }

  /* ───── PAYMENT CARD ───── */
  .payment-card {
    background: linear-gradient(135deg, #1a2f50, #142540);
    border: 1px solid rgba(79,163,247,0.2);
    border-radius: 20px;
    padding: 28px;
    position: relative; overflow: hidden;
  }
  .payment-card::before {
    content: '💳';
    position: absolute; right: 24px; top: 24px; font-size: 32px; opacity: 0.15;
  }
  .payment-amount { font-family: var(--font-head); font-size: 42px; font-weight: 800; margin: 12px 0; }
  .payment-amount span { font-size: 22px; color: var(--text2); }

  /* ───── CHART CONTAINER ───── */
  .chart-container { position: relative; height: 260px; }

  /* ───── MINI CHART ───── */
  .mini-chart { height: 50px; }

  /* ───── NOTIF PANEL ───── */
  .notif-panel {
    position: fixed; right: 20px; top: 80px; z-index: 200;
    width: 320px; background: var(--surface);
    border: 1px solid var(--border2); border-radius: var(--r);
    box-shadow: var(--shadow);
    animation: fadeUp 0.25s ease;
    overflow: hidden;
  }
  .notif-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 700; font-family: var(--font-head); display: flex; justify-content: space-between; align-items: center; }
  .notif-item { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: flex-start; }
  .notif-item:last-child { border-bottom: none; }
  .notif-dot-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .notif-body .notif-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .notif-body .notif-time { font-size: 11px; color: var(--text3); }

  /* ───── MOBILE OVERLAY ───── */
  .mobile-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 99; display: none;
    animation: fadeIn 0.2s ease;
  }
  .mobile-overlay.show { display: block; }

  @media(max-width: 768px) {
    .sidebar { width: 260px; }
    .sidebar.collapsed { transform: translateX(-100%); width: 260px; }
    .main { margin-left: 0; }
    .main.collapsed { margin-left: 0; }
    .page { padding: 16px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .topbar { padding: 0 16px; }
  }
  @media(max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr; }
  }

  /* ───── PROFILE BADGE ───── */
  .profile-badge {
    display: flex; align-items: center; gap: 10px; cursor: pointer;
    padding: 6px 10px 6px 6px; border-radius: 12px;
    background: var(--surface2); border: 1px solid var(--border);
    transition: all 0.2s;
  }
  .profile-badge:hover { border-color: var(--border2); }
  .profile-avatar {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, var(--blue), var(--green));
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px; color: #fff;
  }
  .profile-name { font-size: 13px; font-weight: 600; }
  .profile-role { font-size: 10px; color: var(--text2); }

  /* ───── TIMELINE ───── */
  .timeline { display: flex; flex-direction: column; gap: 12px; }
  .timeline-item {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 14px; background: var(--bg2); border-radius: var(--r2);
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }
  .timeline-item:hover { border-color: var(--border2); }
  .timeline-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .timeline-body { flex: 1; min-width: 0; }
  .timeline-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  .timeline-meta { font-size: 12px; color: var(--text2); }
  .timeline-amount { font-family: var(--font-head); font-weight: 700; font-size: 15px; white-space: nowrap; }

  /* ───── ADMIN TABLE ───── */
  .user-row-status { display: flex; align-items: center; gap: 8px; }
  .user-id { font-family: monospace; font-size: 12px; color: var(--text3); }

  /* ───── SECTION HEADER ───── */
  .section-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 24px; gap: 12px; flex-wrap: wrap;
  }
  .section-title { font-family: var(--font-head); font-size: 24px; font-weight: 700; }
  .section-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }

  /* ───── EMPTY STATE ───── */
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text2); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
  .empty-text { font-size: 15px; font-weight: 500; }

  /* FLOATING DOTS BG (subtle) */
  .float-dot {
    position: absolute; border-radius: 50%;
    animation: floatDot 4s ease-in-out infinite;
    pointer-events: none;
  }

  /* ───── PROGRESS RING ───── */
  .ring-wrap { display: flex; align-items: center; justify-content: center; position: relative; }
  .ring-label { position: absolute; text-align: center; }
  .ring-pct { font-family: var(--font-head); font-size: 22px; font-weight: 800; }
  .ring-sub { font-size: 11px; color: var(--text2); }

  /* CUSTOM SELECT */
  .custom-select {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px;
    color: var(--text2); font-family: var(--font-body); font-size: 12px;
    outline: none; cursor: pointer;
  }
  .custom-select:focus { border-color: var(--blue); }

  /* HIGHLIGHT */
  .highlight-green { color: var(--green); }
  .highlight-blue { color: var(--blue); }
  .highlight-orange { color: var(--orange); }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* INPUT GROUP */
  .input-group { display: flex; gap: 12px; flex-wrap: wrap; }

  /* CHIP */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 600;
    background: var(--surface2); color: var(--text2);
    border: 1px solid var(--border);
  }

  /* SUCCESS ANIMATION */
  @keyframes checkPop { 0%{transform:scale(0);} 70%{transform:scale(1.2);} 100%{transform:scale(1);} }
  .check-anim { animation: checkPop 0.4s ease; }

  /* HAMBURGER */
  .hamburger { display: flex; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
  .hamburger span { display: block; width: 22px; height: 2px; background: var(--text2); border-radius: 2px; transition: all 0.3s; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── MOCK DATA ───────────────────────────────────────────────
const USERS_DATA = [
  { id: 'USR001', name: 'Arjun Sharma',   email: 'arjun@example.com',   password: 'user123', role: 'customer', usage: 142.5, limit: 200, status: 'paid',    joined: 'Jan 2024', address: 'Chennai, TN' },
  { id: 'USR002', name: 'Priya Nair',     email: 'priya@example.com',   password: 'user456', role: 'customer', usage: 188.2, limit: 200, status: 'pending', joined: 'Feb 2024', address: 'Coimbatore, TN' },
  { id: 'USR003', name: 'Vikram Patel',   email: 'vikram@example.com',  password: 'user789', role: 'customer', usage: 210.1, limit: 200, status: 'overdue', joined: 'Mar 2024', address: 'Bangalore, KA' },
  { id: 'USR004', name: 'Meena Reddy',    email: 'meena@example.com',   password: 'user000', role: 'customer', usage: 98.7,  limit: 200, status: 'paid',    joined: 'Nov 2023', address: 'Hyderabad, TS' },
  { id: 'USR005', name: 'Sanjay Kumar',   email: 'sanjay@example.com',  password: 'user111', role: 'customer', usage: 165.3, limit: 200, status: 'pending', joined: 'Apr 2024', address: 'Mumbai, MH' },
];
const ADMIN_DATA = { email: 'admin@gaspulse.com', password: 'admin123', name: 'Admin Console', role: 'admin' };
const PRICE_PER_UNIT = 18.5; // ₹ per unit

const DAILY_USAGE = [
  { day: 'Mon', usage: 18.2 }, { day: 'Tue', usage: 22.5 }, { day: 'Wed', usage: 15.8 },
  { day: 'Thu', usage: 24.1 }, { day: 'Fri', usage: 19.7 }, { day: 'Sat', usage: 28.3 },
  { day: 'Sun', usage: 14.0 },
];
const MONTHLY_USAGE = [
  { month: 'Aug', usage: 120, revenue: 2220 }, { month: 'Sep', usage: 135, revenue: 2497 },
  { month: 'Oct', usage: 118, revenue: 2183 }, { month: 'Nov', usage: 155, revenue: 2867 },
  { month: 'Dec', usage: 168, revenue: 3108 }, { month: 'Jan', usage: 142, revenue: 2627 },
  { month: 'Feb', usage: 160, revenue: 2960 }, { month: 'Mar', usage: 175, revenue: 3237 },
];

const HISTORY = [
  { date: 'Mar 23', units: 14.0, cost: 259.0,  status: 'paid' },
  { date: 'Mar 22', units: 28.3, cost: 523.5,  status: 'paid' },
  { date: 'Mar 21', units: 19.7, cost: 364.4,  status: 'paid' },
  { date: 'Mar 20', units: 24.1, cost: 445.8,  status: 'pending' },
  { date: 'Mar 19', units: 15.8, cost: 292.3,  status: 'paid' },
  { date: 'Mar 18', units: 22.5, cost: 416.2,  status: 'paid' },
];

const NOTIFICATIONS = [
  { id: 1, icon: '⚠️', title: 'High Usage Alert', msg: 'Your usage exceeded 90% of limit', time: '2h ago', bg: 'var(--orange-glow)', color: 'var(--orange)' },
  { id: 2, icon: '💳', title: 'Bill Generated', msg: '₹2,636.25 due by Apr 01', time: '1d ago', bg: 'var(--blue-glow)', color: 'var(--blue)' },
  { id: 3, icon: '✅', title: 'Payment Confirmed', msg: 'March payment received', time: '3d ago', bg: 'var(--green-glow)', color: 'var(--green)' },
];

// ─── CHART HOOK ──────────────────────────────────────────────
function useChart(ref, config, deps) {
  useEffect(() => {
    if (!ref.current) return;
    const ctx = ref.current.getContext('2d');
    const chart = new Chart(ctx, config);
    return () => chart.destroy();
  }, deps);
}

// ─── COMPONENTS ──────────────────────────────────────────────
function StatCard({ icon, label, value, change, changeDir, accentClass, glowClass, delay='' }) {
  return (
    <div className={`stat-card fade-up ${delay}`}>
      <div className={`stat-accent ${accentClass}`}>{icon}</div>
      <div className="stat-label">{label}</div>
      <div className="stat-value">{value}</div>
      {change && <div className={`stat-change ${changeDir}`}>
        {changeDir === 'up' ? '↑' : changeDir === 'down' ? '↓' : '•'} {change}
      </div>}
      <div className={`stat-glow-line ${glowClass}`}></div>
    </div>
  );
}

function Badge({ status }) {
  const map = { paid: 'badge-paid', pending: 'badge-pending', overdue: 'badge-overdue', high: 'badge-high', normal: 'badge-normal' };
  const labels = { paid: 'Paid', pending: 'Pending', overdue: 'Overdue', high: 'High', normal: 'Normal' };
  return <span className={`badge ${map[status] || 'badge-pending'}`}><span className="badge-dot"></span>{labels[status] || status}</span>;
}

// ─── LOGIN PAGE ───────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [role, setRole] = useState('customer');
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  const handleLogin = () => {
    setErr(''); setLoading(true);
    setTimeout(() => {
      setLoading(false);
      if (role === 'admin') {
        if (email === ADMIN_DATA.email && pass === ADMIN_DATA.password) { onLogin(ADMIN_DATA); return; }
        setErr('Invalid admin credentials.');
      } else {
        const user = USERS_DATA.find(u => (u.email === email || u.name.toLowerCase() === email.toLowerCase()) && u.password === pass);
        if (user) { onLogin(user); return; }
        setErr('Invalid email or password.');
      }
    }, 800);
  };

  return (
    <div className="login-wrap">
      <div className="login-bg">
        <div className="login-grid-bg"></div>
        <div className="login-bg-orb orb1"></div>
        <div className="login-bg-orb orb2"></div>
        <div className="login-bg-orb orb3"></div>
      </div>
      <div className="login-card">
        <div className="login-logo">
          <div className="login-logo-icon">🔥</div>
          <div>
            <div className="login-logo-text">GasPulse</div>
            <div className="login-logo-sub">Smart Monitoring</div>
          </div>
        </div>
        <div className="login-title">Welcome Back</div>
        <div className="login-sub">Sign in to your monitoring dashboard</div>

        <div className="role-tabs">
          <button className={`role-tab ${role==='customer'?'active':''}`} onClick={()=>{setRole('customer');setErr('');}}>
            👤 Customer
          </button>
          <button className={`role-tab ${role==='admin'?'active':''}`} onClick={()=>{setRole('admin');setErr('');}}>
            🛠️ Admin
          </button>
        </div>

        <div className="form-group">
          <label className="form-label">Email / Username</label>
          <input className="form-input" type="text" placeholder={role==='admin'?'admin@gaspulse.com':'your@email.com'}
            value={email} onChange={e=>setEmail(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handleLogin()} />
        </div>
        <div className="form-group">
          <label className="form-label">Password</label>
          <input className="form-input" type="password" placeholder="••••••••"
            value={pass} onChange={e=>setPass(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handleLogin()} />
        </div>

        {err && <div style={{color:'var(--red)',fontSize:'13px',marginBottom:'14px',padding:'10px 14px',background:'rgba(242,95,92,0.1)',borderRadius:'8px',border:'1px solid rgba(242,95,92,0.3)'}}>{err}</div>}

        <button className="btn-primary" onClick={handleLogin} disabled={loading}>
          {loading ? <span style={{display:'inline-block',width:16,height:16,border:'2px solid rgba(255,255,255,0.4)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}></span> : '→ Sign In'}
        </button>

        <div className="login-hint" style={{marginTop:20}}>
          <div style={{marginBottom:6,fontWeight:700,fontSize:11,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text2)'}}>Demo Credentials</div>
          {role==='admin' ? <>
            <div>👤 <strong>admin@gaspulse.com</strong></div>
            <div>🔑 <strong>admin123</strong></div>
          </> : <>
            <div>👤 <strong>arjun@example.com</strong> &nbsp;🔑 <strong>user123</strong></div>
            <div style={{marginTop:4}}>👤 <strong>priya@example.com</strong> &nbsp;🔑 <strong>user456</strong></div>
          </>}
        </div>
      </div>
    </div>
  );
}

// ─── SIDEBAR ──────────────────────────────────────────────────
function Sidebar({ user, page, setPage, collapsed, mobileOpen, setMobileOpen, onLogout }) {
  const customerNav = [
    { id: 'dashboard', icon: '📊', label: 'Dashboard' },
    { id: 'usage',     icon: '🔥', label: 'Usage' },
    { id: 'payments',  icon: '💳', label: 'Payments', badge: user?.status==='pending'?'1':null },

  const adminNav = [
    { id: 'admin-overview', icon: '📊', label: 'Overview' },

    { id: 'admin-revenue',  icon: '💰', label: 'Revenue' },
    { id: 'admin-settings', icon: '⚙️', label: 'Settings' },
  ];
  const nav = user?.role === 'admin' ? adminNav : customerNav;

  return (
    <>
      {mobileOpen && <div className="mobile-overlay show" onClick={()=>setMobileOpen(false)}></div>}
      <aside className={`sidebar ${collapsed?'collapsed':''} ${!mobileOpen&&window.innerWidth<=768?'mobile-hidden':''}`}>
        <div className="sidebar-header">
          <div className="sidebar-logo-icon">🔥</div>
          {!collapsed && <div>
            <div className="sidebar-logo-text">GasPulse</div>
            <div className="sidebar-logo-sub">Smart Monitor</div>
          </div>}

        <div style={{flex:1,padding:'8px 0'}}>

              <span className="nav-label">{item.label}</span>

        <div className="sidebar-footer">
          {!collapsed && <div className="user-card">

          <div className="user-info">
            <div className="profile-name">{user?.name?.split(' ')[0]}</div>
            <div className="profile-role">{user?.role}</div>
          </div>
        </div>
      </div>

}

// ─── CUSTOMER DASHBOARD ───────────────────────────────────────
function CustomerDashboard({ user }) {
  const chartRef = useRef();
  const u = user;
  const totalCost = (u.usage * PRICE_PER_UNIT).toFixed(2);
  const usagePct = Math.min((u.usage / u.limit) * 100, 100);

  useChart(chartRef, {
    type: 'line',
    data: {
      labels: DAILY_USAGE.map(d=>d.day),
      datasets: [{
        label: 'Gas Usage (units)',
        data: DAILY_USAGE.map(d=>d.usage),
        borderColor: '#22d07a',
        backgroundColor: 'rgba(34,208,122,0.08)',
        borderWidth: 2.5,
        pointBackgroundColor: '#22d07a',
        pointBorderColor: '#0f1629',
        pointBorderWidth: 2,
        pointRadius: 5,
        tension: 0.45,
        fill: true,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(99,179,237,0.07)' }, ticks: { color: '#8fa3c8' } },
        y: { grid: { color: 'rgba(99,179,237,0.07)' }, ticks: { color: '#8fa3c8' } }
      }
    }
  }, []);

  return (
    <div className="page">
      {u.usage > u.limit * 0.9 && (
        <div className="alert-banner alert-warning fade-up">
          <span className="alert-icon">⚠️</span>
          <div className="alert-text">
            <div className="alert-title">High Usage Alert</div>
            <div className="alert-sub">You've used {usagePct.toFixed(0)}% of your monthly limit. Consider reducing consumption.</div>
          </div>
        </div>
      )}

      <div className="stats-grid">
        <StatCard icon="🔥" label="Gas Used" value={`${u.usage} u`} change="This month" changeDir="neutral" accentClass="accent-green" glowClass="glow-green" delay="fade-up-1"/>
        <StatCard icon="💰" label="Amount Due" value={`₹${totalCost}`} change={`@ ₹${PRICE_PER_UNIT}/unit`} changeDir="neutral" accentClass="accent-orange" glowClass="glow-orange" delay="fade-up-2"/>
        <StatCard icon="📏" label="Monthly Limit" value={`${u.limit} u`} change="Reset in 8 days" changeDir="neutral" accentClass="accent-blue" glowClass="glow-blue" delay="fade-up-3"/>
        <StatCard icon="📋" label="Status" value={u.status==='paid'?'Clear':'Due'} change={u.status==='paid'?'All paid up':'Payment needed'} changeDir={u.status==='paid'?'up':'down'} accentClass={u.status==='paid'?'accent-green':'accent-orange'} glowClass={u.status==='paid'?'glow-green':'glow-orange'} delay="fade-up-4"/>
      </div>

      <div className="grid-3">
        <div className="card fade-up fade-up-2">
          <div className="card-header">
            <div><div className="card-title">Weekly Usage</div><div className="card-sub">Units consumed per day</div></div>
            <select className="custom-select"><option>This Week</option><option>Last Week</option></select>
          </div>
          <div className="chart-container">
            <canvas ref={chartRef}></canvas>
          </div>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:20}}>
          <div className="card fade-up fade-up-3">
            <div className="card-title" style={{marginBottom:16}}>Usage Meter</div>
            <div className="meter-wrap">
              <div className="meter-label">
                <span>{u.usage} used</span>
                <span style={{color:usagePct>90?'var(--red)':usagePct>70?'var(--orange)':'var(--green)'}}>{usagePct.toFixed(1)}%</span>
              </div>
              <div className="meter-bar">
                <div className={`meter-fill ${usagePct>90?'danger':usagePct>70?'warning':''}`} style={{width:`${usagePct}%`}}></div>
              </div>
              <div className="meter-label" style={{marginTop:6}}>
                <span style={{color:'var(--text3)'}}>Limit: {u.limit} units</span>

        <div className="card fade-up fade-up-2">
          <div className="card-header"><div><div className="card-title">Collection Split</div></div></div>
          <div className="chart-container"><canvas ref={doughRef}></canvas></div>
        </div>
      </div>
    </div>
  );
}

// ─── ADMIN SETTINGS ───────────────────────────────────────────
function AdminSettings() {
  const [price, setPrice] = useState(PRICE_PER_UNIT);
  const [limit, setLimit] = useState(200);
  const [saved, setSaved] = useState(false);

  const handleSave = () => {
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  return (
    <div className="page">
      <div className="grid-2">
        <div className="card fade-up fade-up-1">
          <div className="card-title" style={{marginBottom:20}}>Pricing Configuration</div>
          <div className="form-group">
            <label className="form-label">Price per Unit (₹)</label>
            <input className="form-input" type="number" value={price} onChange={e=>setPrice(+e.target.value)}/>
          </div>
          <div className="form-group">
            <label className="form-label">Monthly Limit (units)</label>
            <input className="form-input" type="number" value={limit} onChange={e=>setLimit(+e.target.value)}/>
          </div>
          <div className="form-group">
            <label className="form-label">Alert Threshold (%)</label>
            <input className="form-input" type="number" defaultValue={90}/>
          </div>
          <button className="btn btn-green" onClick={handleSave} style={{width:'100%'}}>
            {saved ? '✅ Saved!' : '💾 Save Settings'}
          </button>
        </div>

        <div className="card fade-up fade-up-2">
          <div className="card-title" style={{marginBottom:20}}>System Status</div>
          {[
            {l:'Gas Monitoring API', s:'Operational', ok:true},
            {l:'Payment Gateway', s:'Operational', ok:true},
            {l:'SMS Alerts', s:'Operational', ok:true},
            {l:'Data Sync', s:'Last sync: 2 min ago', ok:true},
            {l:'Backup Service', s:'Running', ok:true},
          ].map((item,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderBottom:i<4?'1px solid var(--border)':'none'}}>
              <span style={{fontSize:13}}>{item.l}</span>
              <span style={{fontSize:12,color:'var(--green)',display:'flex',alignItems:'center',gap:6}}>
                <span style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',display:'inline-block',animation:'pulse 2s infinite'}}></span>
                {item.s}
              </span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── NOTIFICATION PANEL ───────────────────────────────────────
function NotifPanel({ onClose }) {
  return (
    <div className="notif-panel">
      <div className="notif-header">
        Notifications
        <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text2)',fontSize:18}}>×</button>
      </div>
      {NOTIFICATIONS.map(n => (
        <div key={n.id} className="notif-item">
          <div className="notif-dot-icon" style={{background:n.bg}}>{n.icon}</div>
          <div className="notif-body">
            <div className="notif-title">{n.title}</div>
            <div style={{fontSize:12,color:'var(--text2)',margin:'2px 0'}}>{n.msg}</div>
            <div className="notif-time">{n.time}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState(null);
  const [collapsed, setCollapsed] = useState(false);
  const [mobileOpen, setMobileOpen] = useState(false);
  const [dark, setDark] = useState(true);
  const [notifOpen, setNotifOpen] = useState(false);

  useEffect(() => {
    document.documentElement.className = dark ? '' : 'light';
  }, [dark]);

  const handleLogin = (u) => {
    setUser(u);
    setPage(u.role === 'admin' ? 'admin-overview' : 'dashboard');
  };

  const handleLogout = () => { setUser(null); setPage(null); };

  if (!user) return <LoginPage onLogin={handleLogin}/>;

  const renderPage = () => {
    if (user.role === 'admin') {
      if (page === 'admin-overview') return <AdminOverview/>;
      if (page === 'admin-users') return <AdminUsers/>;
      if (page === 'admin-revenue') return <AdminRevenue/>;
      if (page === 'admin-settings') return <AdminSettings/>;
    } else {
      if (page === 'dashboard') return <CustomerDashboard user={user}/>;
      if (page === 'usage') return <UsagePage user={user}/>;
      if (page === 'payments') return <PaymentsPage user={user}/>;
    }
    return <CustomerDashboard user={user}/>;
  };

  return (
    <div className="app-shell">
      <Sidebar user={user} page={page} setPage={setPage} collapsed={collapsed} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} onLogout={handleLogout}/>
      <div className={`main ${collapsed?'collapsed':''}`}>
        <Topbar user={user} page={page} collapsed={collapsed} setCollapsed={setCollapsed} setMobileOpen={setMobileOpen} dark={dark} setDark={setDark} notifOpen={notifOpen} setNotifOpen={setNotifOpen}/>
        {renderPage()}
      </div>
      {notifOpen && <NotifPanel onClose={()=>setNotifOpen(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
