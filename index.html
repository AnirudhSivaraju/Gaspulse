<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GasPulse – Smart Gas Monitoring</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<!-- MQTT.js via CDN (WebSocket support) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0f1e;
    --bg2:     #0f1629;
    --bg3:     #141d35;
    --surface: #1a2540;
    --surface2:#1f2d4a;
    --border:  rgba(99,179,237,0.12);
    --border2: rgba(99,179,237,0.22);
    --green:   #22d07a;
    --green2:  #16a85f;
    --green-glow: rgba(34,208,122,0.18);
    --blue:    #4fa3f7;
    --blue2:   #2d7dd2;
    --blue-glow: rgba(79,163,247,0.18);
    --orange:  #f97316;
    --orange2: #ea6c10;
    --orange-glow: rgba(249,115,22,0.18);
    --red:     #f25f5c;
    --text:    #e8f0fe;
    --text2:   #8fa3c8;
    --text3:   #5a7299;
    --font-head:'Syne', sans-serif;
    --font-body:'DM Sans', sans-serif;
    --r:  16px;
    --r2: 12px;
    --shadow:  0 8px 32px rgba(0,0,0,0.4);
    --shadow2: 0 2px 12px rgba(0,0,0,0.3);
  }
  .light {
    --bg:      #f0f4ff;
    --bg2:     #e8eef8;
    --bg3:     #dde6f4;
    --surface: #ffffff;
    --surface2:#f5f8ff;
    --border:  rgba(45,125,210,0.15);
    --border2: rgba(45,125,210,0.28);
    --text:    #0f1629;
    --text2:   #3d5278;
    --text3:   #7a9bc4;
    --shadow:  0 8px 32px rgba(79,123,200,0.12);
    --shadow2: 0 2px 12px rgba(79,123,200,0.1);
    --green-glow: rgba(34,208,122,0.1);
    --blue-glow:  rgba(79,163,247,0.1);
    --orange-glow:rgba(249,115,22,0.1);
  }

  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font-body); font-size: 14px;
    min-height: 100vh; transition: background .3s,color .3s;
    overflow-x: hidden;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

  /* ── ANIMATIONS ─────────────────────────────────────────────── */
  @keyframes fadeUp   { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn   { from{opacity:0} to{opacity:1} }
  @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.45} }
  @keyframes spin     { to{transform:rotate(360deg)} }
  @keyframes glow     { 0%,100%{box-shadow:0 0 20px var(--green-glow)} 50%{box-shadow:0 0 40px var(--green-glow),0 0 60px var(--green-glow)} }
  @keyframes countUp  { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }
  @keyframes blink    { 0%,100%{opacity:1} 50%{opacity:.2} }
  @keyframes liveRing { 0%{transform:scale(1);opacity:.6} 100%{transform:scale(2.4);opacity:0} }
  @keyframes shimmer  { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

  .fade-up   { animation: fadeUp .5s ease both; }
  .fade-up-1 { animation-delay:.05s }
  .fade-up-2 { animation-delay:.10s }
  .fade-up-3 { animation-delay:.15s }
  .fade-up-4 { animation-delay:.20s }
  .fade-up-5 { animation-delay:.25s }

  /* ── LOGIN ───────────────────────────────────────────────────── */
  .login-wrap {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden; background:var(--bg);
  }
  .login-bg { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .login-orb { position:absolute; border-radius:50%; filter:blur(80px); }
  .orb1 { width:520px;height:520px;background:rgba(34,208,122,.08);top:-120px;left:-120px }
  .orb2 { width:420px;height:420px;background:rgba(79,163,247,.08);bottom:-90px;right:-90px }
  .orb3 { width:320px;height:320px;background:rgba(249,115,22,.06);top:35%;right:15% }
  .login-grid {
    position:absolute; inset:0;
    background-image:linear-gradient(var(--border) 1px,transparent 1px),
                     linear-gradient(90deg,var(--border) 1px,transparent 1px);
    background-size:40px 40px; opacity:.5;
  }
  .login-card {
    position:relative; z-index:1;
    background:var(--surface); border:1px solid var(--border2);
    border-radius:24px; padding:48px;
    width:100%; max-width:440px;
    box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.05);
    animation:fadeUp .6s ease;
  }
  .login-logo { display:flex; align-items:center; gap:12px; margin-bottom:32px; }
  .login-logo-icon {
    width:48px; height:48px; flex-shrink:0;
    background:linear-gradient(135deg,var(--green),var(--blue2));
    border-radius:14px; display:flex; align-items:center; justify-content:center;
    font-size:22px; animation:glow 3s ease infinite;
  }
  .login-logo-text { font-family:var(--font-head); font-size:22px; font-weight:800 }
  .login-logo-sub  { font-size:11px; color:var(--text2); letter-spacing:.1em; text-transform:uppercase }
  .login-title { font-family:var(--font-head); font-size:28px; font-weight:700; margin-bottom:6px }
  .login-sub   { color:var(--text2); margin-bottom:32px; font-size:14px }

  .role-tabs { display:flex; gap:8px; margin-bottom:28px; background:var(--bg2); border-radius:12px; padding:4px }
  .role-tab  { flex:1; padding:10px; border:none; border-radius:10px; font-family:var(--font-body); font-size:14px; font-weight:500; cursor:pointer; transition:all .25s; color:var(--text2); background:transparent }
  .role-tab.active { background:var(--surface); color:var(--text); box-shadow:var(--shadow2) }

  .form-group  { margin-bottom:18px }
  .form-label  { font-size:12px; font-weight:600; color:var(--text2); letter-spacing:.06em; text-transform:uppercase; margin-bottom:8px; display:block }
  .form-input  { width:100%; padding:12px 14px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--r2); color:var(--text); font-family:var(--font-body); font-size:14px; outline:none; transition:border-color .2s,box-shadow .2s }
  .form-input:focus { border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-glow) }
  .form-input::placeholder { color:var(--text3) }

  .btn-primary { width:100%; padding:14px; background:linear-gradient(135deg,var(--green2),var(--green)); border:none; border-radius:var(--r2); color:#fff; font-family:var(--font-body); font-size:15px; font-weight:600; cursor:pointer; transition:all .25s; letter-spacing:.02em }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(34,208,122,.35) }
  .btn-primary:disabled { opacity:.7; cursor:not-allowed; transform:none }

  .login-hint { margin-top:18px; padding:12px 14px; background:var(--bg2); border-radius:var(--r2); font-size:12px; color:var(--text2); border:1px solid var(--border) }
  .login-hint strong { color:var(--text) }

  /* ── APP SHELL ───────────────────────────────────────────────── */
  .app-shell { display:flex; min-height:100vh }

  /* ── SIDEBAR ─────────────────────────────────────────────────── */
  .sidebar {
    width:260px; min-height:100vh;
    background:var(--surface); border-right:1px solid var(--border);
    display:flex; flex-direction:column;
    position:fixed; left:0; top:0; bottom:0; z-index:100;
    transition:transform .3s ease, width .3s ease;
    overflow-y:auto; overflow-x:hidden;
  }
  .sidebar.collapsed  { width:72px }
  .sidebar.mob-hidden { transform:translateX(-100%) }

  .sidebar-header {
    padding:22px 18px 18px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px;
    position:sticky; top:0; background:var(--surface); z-index:1; flex-shrink:0;
  }
  .sidebar-logo-icon { width:36px;height:36px;flex-shrink:0; background:linear-gradient(135deg,var(--green),var(--blue2)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px }
  .sidebar-logo-text { font-family:var(--font-head); font-size:17px; font-weight:800; white-space:nowrap }
  .sidebar-logo-sub  { font-size:10px; color:var(--text2); letter-spacing:.1em; text-transform:uppercase }

  .sidebar-section { font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--text3); padding:18px 18px 6px; white-space:nowrap }
  .sidebar.collapsed .sidebar-section { opacity:0 }

  .nav-item {
    display:flex; align-items:center; gap:13px;
    padding:11px 18px; margin:2px 8px;
    border-radius:10px; cursor:pointer;
    color:var(--text2); font-size:14px; font-weight:500;
    transition:all .2s; white-space:nowrap; overflow:hidden;
    border:none; background:transparent; width:calc(100% - 16px); text-align:left; position:relative;
  }
  .nav-item:hover { background:var(--surface2); color:var(--text) }
  .nav-item.active { background:linear-gradient(135deg,rgba(34,208,122,.15),rgba(79,163,247,.1)); color:var(--green) }
  .nav-item.active::before { content:''; position:absolute; left:0; top:20%; bottom:20%; width:3px; background:var(--green); border-radius:0 3px 3px 0; margin-left:-8px }
  .nav-icon  { font-size:17px; flex-shrink:0; width:20px; text-align:center }
  .nav-label { flex:1 }
  .sidebar.collapsed .nav-label, .sidebar.collapsed .sidebar-logo-text, .sidebar.collapsed .sidebar-logo-sub { display:none }
  .sidebar.collapsed .nav-item { padding:11px 0; justify-content:center; width:100%; margin:2px 0; border-radius:0 }
  .sidebar.collapsed .nav-item.active::before { left:0; margin-left:0 }

  .sidebar-footer { margin-top:auto; padding:14px; border-top:1px solid var(--border); flex-shrink:0 }
  .user-card { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; background:var(--bg2); overflow:hidden }
  .user-avatar { width:34px;height:34px; border-radius:9px; background:linear-gradient(135deg,var(--blue),var(--green)); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#fff; flex-shrink:0 }
  .user-name { font-weight:600; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
  .user-role-label { font-size:10px; color:var(--text2); text-transform:capitalize }
  .sidebar.collapsed .user-card { padding:8px; justify-content:center }
  .sidebar.collapsed .user-info { display:none }

  /* ── MAIN ────────────────────────────────────────────────────── */
  .main { margin-left:260px; flex:1; transition:margin-left .3s; min-width:0 }
  .main.collapsed { margin-left:72px }

  .topbar {
    height:64px; background:var(--surface); border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 24px; position:sticky; top:0; z-index:50; gap:16px;
  }
  .topbar-left  { display:flex; align-items:center; gap:14px }
  .topbar-right { display:flex; align-items:center; gap:10px }

  .icon-btn {
    width:36px; height:36px; border-radius:9px;
    background:var(--surface2); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:15px; transition:all .2s; flex-shrink:0;
  }
  .icon-btn:hover { background:var(--bg3); transform:translateY(-1px) }

  .page-title    { font-family:var(--font-head); font-size:19px; font-weight:700 }
  .page-subtitle { font-size:12px; color:var(--text2); margin-top:1px }

  .profile-badge { display:flex; align-items:center; gap:9px }
  .profile-avatar { width:34px;height:34px; border-radius:9px; background:linear-gradient(135deg,var(--blue),var(--green)); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#fff; flex-shrink:0 }
  .profile-name { font-size:13px; font-weight:600 }
  .profile-role { font-size:10px; color:var(--text2); text-transform:capitalize }

  /* MQTT STATUS PILL */
  .mqtt-pill {
    display:flex; align-items:center; gap:7px;
    padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600;
    border:1px solid; transition:all .4s;
  }
  .mqtt-pill.connected    { background:rgba(34,208,122,.12); border-color:rgba(34,208,122,.3); color:var(--green) }
  .mqtt-pill.disconnected { background:rgba(242,95,92,.12);  border-color:rgba(242,95,92,.3);  color:var(--red) }
  .mqtt-pill.connecting   { background:rgba(249,115,22,.12); border-color:rgba(249,115,22,.3); color:var(--orange) }
  .mqtt-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0 }
  .mqtt-dot.connected    { background:var(--green); animation:pulse 2s infinite }
  .mqtt-dot.disconnected { background:var(--red) }
  .mqtt-dot.connecting   { background:var(--orange); animation:blink 1s infinite }

  /* ── PAGE LAYOUT ─────────────────────────────────────────────── */
  .page { padding:26px; animation:fadeIn .35s ease }

  .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:18px; margin-bottom:26px }
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px }
  .grid-3 { display:grid; grid-template-columns:2fr 1fr; gap:20px; margin-bottom:20px }

  /* ── STAT CARDS ─────────────────────────────────────────────── */
  .stat-card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--r);
    padding:22px; position:relative; overflow:hidden;
    transition:transform .2s, box-shadow .2s; cursor:default;
  }
  .stat-card:hover { transform:translateY(-3px); box-shadow:var(--shadow) }
  .stat-accent { width:46px;height:46px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:20px; margin-bottom:14px }
  .accent-green  { background:var(--green-glow) }
  .accent-blue   { background:var(--blue-glow) }
  .accent-orange { background:var(--orange-glow) }
  .accent-red    { background:rgba(242,95,92,.15) }

  .stat-label { font-size:11px; font-weight:600; color:var(--text2); letter-spacing:.06em; text-transform:uppercase; margin-bottom:7px }
  .stat-value { font-family:var(--font-head); font-size:30px; font-weight:800; line-height:1; margin-bottom:7px; animation:countUp .5s ease }
  .stat-change { font-size:12px; display:flex; align-items:center; gap:4px }
  .stat-change.up      { color:var(--green) }
  .stat-change.down    { color:var(--red) }
  .stat-change.neutral { color:var(--text2) }

  .stat-glow-line { position:absolute; bottom:0; left:0; right:0; height:2px; border-radius:0 0 var(--r) var(--r) }
  .glow-green  { background:linear-gradient(90deg,transparent,var(--green),transparent) }
  .glow-blue   { background:linear-gradient(90deg,transparent,var(--blue),transparent) }
  .glow-orange { background:linear-gradient(90deg,transparent,var(--orange),transparent) }

  /* ── CARDS ───────────────────────────────────────────────────── */
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:22px }
  .card-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:18px; gap:12px }
  .card-title  { font-family:var(--font-head); font-size:15px; font-weight:700 }
  .card-sub    { font-size:12px; color:var(--text2); margin-top:3px }

  /* ── LIVE INDICATOR ─────────────────────────────────────────── */
  .live-badge {
    display:inline-flex; align-items:center; gap:6px;
    padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700;
    background:rgba(34,208,122,.12); border:1px solid rgba(34,208,122,.25); color:var(--green);
  }
  .live-dot-wrap { position:relative; width:8px; height:8px }
  .live-dot { width:8px;height:8px; border-radius:50%; background:var(--green) }
  .live-ring { position:absolute; inset:0; border-radius:50%; border:2px solid var(--green); animation:liveRing 1.5s ease-out infinite }

  /* ── BIG GAS VALUE ───────────────────────────────────────────── */
  .gas-hero { text-align:center; padding:36px 20px }
  .gas-num  { font-family:var(--font-head); font-size:72px; font-weight:800; line-height:1; letter-spacing:-2px }
  .gas-num.live { color:var(--green); text-shadow:0 0 40px rgba(34,208,122,.35) }
  .gas-num.nodata { color:var(--text3) }
  .gas-unit { font-size:22px; font-weight:500; color:var(--text2); margin-top:4px }
  .gas-ts   { font-size:12px; color:var(--text3); margin-top:10px }

  /* ── METER BAR ───────────────────────────────────────────────── */
  .meter-bar  { height:8px; background:var(--bg3); border-radius:100px; overflow:hidden; margin-top:6px }
  .meter-fill { height:100%; border-radius:100px; background:linear-gradient(90deg,var(--green2),var(--green)); transition:width .6s ease }
  .meter-fill.warning { background:linear-gradient(90deg,#f97316,#fb923c) }
  .meter-fill.danger  { background:linear-gradient(90deg,#ef4444,#f87171) }
  .meter-label { display:flex; justify-content:space-between; font-size:12px; color:var(--text2); margin-bottom:4px }

  /* ── CHART ───────────────────────────────────────────────────── */
  .chart-wrap { position:relative; height:220px }

  /* ── TABLE ───────────────────────────────────────────────────── */
  .table-wrap { overflow-x:auto }
  table { width:100%; border-collapse:collapse }
  th { font-size:11px; font-weight:700; color:var(--text2); letter-spacing:.06em; text-transform:uppercase; padding:10px 14px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap }
  td { padding:13px 14px; border-bottom:1px solid var(--border); font-size:13px; vertical-align:middle }
  tr:last-child td { border-bottom:none }
  tr:hover td { background:var(--surface2) }

  /* ── BADGE ───────────────────────────────────────────────────── */
  .badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; white-space:nowrap }
  .badge-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0 }
  .badge-online  { background:rgba(34,208,122,.15);  color:var(--green);  border:1px solid rgba(34,208,122,.25)  }
  .badge-online .badge-dot { background:var(--green); animation:pulse 2s infinite }
  .badge-offline { background:rgba(242,95,92,.13);   color:var(--red);    border:1px solid rgba(242,95,92,.25)   }
  .badge-offline .badge-dot { background:var(--red) }
  .badge-nodata  { background:rgba(90,114,153,.13);  color:var(--text2);  border:1px solid var(--border) }
  .badge-nodata .badge-dot { background:var(--text3) }

  /* ── ALERT BANNER ────────────────────────────────────────────── */
  .alert { display:flex; align-items:flex-start; gap:12px; padding:14px 18px; border-radius:var(--r2); margin-bottom:20px; border:1px solid }
  .alert-warn    { background:rgba(249,115,22,.1);  border-color:rgba(249,115,22,.3);  color:var(--orange) }
  .alert-info    { background:rgba(79,163,247,.1);  border-color:rgba(79,163,247,.3);  color:var(--blue) }
  .alert-success { background:rgba(34,208,122,.1);  border-color:rgba(34,208,122,.3);  color:var(--green) }
  .alert-icon    { font-size:18px; flex-shrink:0; margin-top:1px }
  .alert-title   { font-weight:600; font-size:13px }
  .alert-msg     { font-size:12px; color:var(--text2); margin-top:3px }

  /* ── MQTT CONFIG MODAL ───────────────────────────────────────── */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(6px); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn .2s ease }
  .modal-card { background:var(--surface); border:1px solid var(--border2); border-radius:24px; padding:36px; width:100%; max-width:480px; box-shadow:var(--shadow); animation:fadeUp .35s ease }
  .modal-title { font-family:var(--font-head); font-size:20px; font-weight:700; margin-bottom:6px }
  .modal-sub   { color:var(--text2); font-size:13px; margin-bottom:24px }
  .modal-close { position:absolute; top:18px; right:18px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; color:var(--text2) }
  .modal-close:hover { color:var(--text) }

  .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:9px 18px; border-radius:10px; font-family:var(--font-body); font-size:13px; font-weight:600; cursor:pointer; border:none; transition:all .2s; white-space:nowrap }
  .btn-green  { background:linear-gradient(135deg,var(--green2),var(--green)); color:#fff }
  .btn-green:hover { box-shadow:0 6px 20px rgba(34,208,122,.3) }
  .btn-blue   { background:linear-gradient(135deg,var(--blue2),var(--blue));  color:#fff }
  .btn-blue:hover  { box-shadow:0 6px 20px rgba(79,163,247,.3) }
  .btn-ghost  { background:var(--surface2); border:1px solid var(--border); color:var(--text2) }
  .btn-ghost:hover { color:var(--text) }

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ═══════════════════════════════════════════════════════════════
   CONSTANTS & HELPERS
═══════════════════════════════════════════════════════════════ */
const PULSE_TO_M3 = 10; // 1 pulse = 10 m³ (as specified)

// Fixed credential sets — no payment data
const USERS_DB = [
  { id:'USR001', name:'Arjun Sharma',  email:'arjun@example.com',  password:'user123', role:'customer', topic:'gas/user1/usage' },
  { id:'USR002', name:'Priya Nair',    email:'priya@example.com',  password:'user456', role:'customer', topic:'gas/user2/usage' },
  { id:'USR003', name:'Vikram Patel',  email:'vikram@example.com', password:'user789', role:'customer', topic:'gas/user3/usage' },
];
const ADMIN_DB = { email:'admin@gaspulse.com', password:'admin123', name:'Admin Console', role:'admin' };

// Default MQTT config pre-filled from image
const DEFAULT_MQTT = {
  broker:   'tdf182ef.ala.asia-southeast1.emqxsl.com',
  port:     '8084',
  username: '',
  password: '',
  topic:    'gas/user1/usage',
};

function fmtTime(d) {
  if (!d) return '—';
  return new Date(d).toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}
function fmtDateTime(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('en-IN', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit', second:'2-digit' });
}
function toM3(pulse) { return parseFloat((pulse * PULSE_TO_M3).toFixed(2)); }

/* ═══════════════════════════════════════════════════════════════
   CHART HOOK
═══════════════════════════════════════════════════════════════ */
function useChart(ref, buildConfig, deps) {
  useEffect(() => {
    if (!ref.current) return;
    const ctx = ref.current.getContext('2d');
    const chart = new Chart(ctx, buildConfig());
    return () => chart.destroy();
  }, deps);
}

/* ═══════════════════════════════════════════════════════════════
   MQTT HOOK — core real-time engine
═══════════════════════════════════════════════════════════════ */
function useMQTT(config, enabled) {
  const [status, setStatus]       = useState('disconnected'); // connecting | connected | disconnected
  const [messages, setMessages]   = useState([]);             // {topic, pulse, m3, ts}
  const [devices, setDevices]     = useState({});             // {topic: {pulse,m3,ts,active}}
  const clientRef = useRef(null);

  const connect = useCallback(() => {
    if (clientRef.current) {
      try { clientRef.current.end(true); } catch(_) {}
    }
    setStatus('connecting');
    const url = `wss://${config.broker}:${config.port}/mqtt`;
    const opts = {
      clean: true,
      reconnectPeriod: 5000,
      connectTimeout: 10000,
      clientId: 'gaspulse_' + Math.random().toString(16).slice(2, 8),
    };
    if (config.username) opts.username = config.username;
    if (config.password) opts.password = config.password;

    let client;
    try {
      client = mqtt.connect(url, opts);
    } catch(e) {
      setStatus('disconnected');
      return;
    }
    clientRef.current = client;

    client.on('connect', () => {
      setStatus('connected');
      // Subscribe to the configured topic AND wildcard for admin
      const topics = [config.topic, 'gas/+/usage'];
      topics.forEach(t => { try { client.subscribe(t); } catch(_) {} });
    });

    client.on('message', (topic, payload) => {
      const raw = payload.toString().trim();
      const pulse = parseFloat(raw);
      if (isNaN(pulse)) return;
      const m3 = toM3(pulse);
      const ts = Date.now();

      setMessages(prev => {
        const entry = { topic, pulse, m3, ts };
        const next = [entry, ...prev].slice(0, 200); // keep last 200
        return next;
      });
      setDevices(prev => ({
        ...prev,
        [topic]: { pulse, m3, ts, active: true }
      }));
    });

    client.on('error',        () => setStatus('disconnected'));
    client.on('close',        () => setStatus('disconnected'));
    client.on('offline',      () => setStatus('disconnected'));
    client.on('reconnect',    () => setStatus('connecting'));
  }, [config]);

  const disconnect = useCallback(() => {
    if (clientRef.current) {
      try { clientRef.current.end(true); } catch(_) {}
      clientRef.current = null;
    }
    setStatus('disconnected');
  }, []);

  useEffect(() => {
    if (enabled) connect();
    else disconnect();
    return () => { if (clientRef.current) { try { clientRef.current.end(true); } catch(_) {} } };
  }, [enabled, config.broker, config.port, config.username, config.password, config.topic]);

  // Mark device as inactive after 30 s of silence
  useEffect(() => {
    const iv = setInterval(() => {
      const now = Date.now();
      setDevices(prev => {
        const updated = { ...prev };
        let changed = false;
        Object.keys(updated).forEach(k => {
          if (updated[k].active && now - updated[k].ts > 30000) {
            updated[k] = { ...updated[k], active: false };
            changed = true;
          }
        });
        return changed ? updated : prev;
      });
    }, 5000);
    return () => clearInterval(iv);
  }, []);

  return { status, messages, devices, connect, disconnect };
}

/* ═══════════════════════════════════════════════════════════════
   SMALL REUSABLE COMPONENTS
═══════════════════════════════════════════════════════════════ */
function StatCard({ icon, label, value, change, dir='neutral', accent='accent-green', glow='glow-green', delay='' }) {
  return (
    <div className={`stat-card fade-up ${delay}`}>
      <div className={`stat-accent ${accent}`}>{icon}</div>
      <div className="stat-label">{label}</div>
      <div className="stat-value">{value}</div>
      {change && <div className={`stat-change ${dir}`}>{dir==='up'?'↑':dir==='down'?'↓':'•'} {change}</div>}
      <div className={`stat-glow-line ${glow}`}/>
    </div>
  );
}

function ConnStatus({ status }) {
  return (
    <div className={`mqtt-pill ${status}`}>
      <span className={`mqtt-dot ${status}`}/>
      {status === 'connected'    && 'Connected'}
      {status === 'disconnected' && 'Disconnected'}
      {status === 'connecting'   && 'Connecting…'}
    </div>
  );
}

function DeviceBadge({ active }) {
  if (active) return <span className="badge badge-online"><span className="badge-dot"/>Online</span>;
  return <span className="badge badge-offline"><span className="badge-dot"/>Offline</span>;
}

function LiveBadge() {
  return (
    <span className="live-badge">
      <span className="live-dot-wrap"><span className="live-dot"/><span className="live-ring"/></span>
      LIVE
    </span>
  );
}

/* ═══════════════════════════════════════════════════════════════
   MQTT CONFIG MODAL
═══════════════════════════════════════════════════════════════ */
function MqttConfigModal({ cfg, onSave, onClose }) {
  const [form, setForm] = useState({ ...cfg });

  return (

      <div className="modal-card" style={{ position:'relative' }}>

        <div className="modal-title">🔌 MQTT Configuration</div>
        <div className="modal-sub">Configure your EMQX broker connection</div>

        <div className="form-group">
          <label className="form-label">Broker Address</label>
          <input className="form-input" placeholder="tdf182ef.ala.asia-southeast1.emqxsl.com" value={form.broker} onChange={e=>set('broker',e.target.value)}/>
        </div>
        <div className="form-group">
          <label className="form-label">WebSocket Port</label>
          <input className="form-input" placeholder="8084" value={form.port} onChange={e=>set('port',e.target.value)}/>
        </div>
        <div className="input-row">
          <div className="form-group" style={{flex:1}}>
            <label className="form-label">Username</label>
            <input className="form-input" placeholder="(optional)" value={form.username} onChange={e=>set('username',e.target.value)}/>
          </div>
          <div className="form-group" style={{flex:1}}>
            <label className="form-label">Password</label>
            <input className="form-input" type="password" placeholder="(optional)" value={form.password} onChange={e=>set('password',e.target.value)}/>
          </div>
        </div>
        <div className="form-group">
          <label className="form-label">Topic</label>
          <input className="form-input" placeholder="gas/user1/usage" value={form.topic} onChange={e=>set('topic',e.target.value)}/>
          <div style={{fontSize:11,color:'var(--text3)',marginTop:6}}>💡 Use <code style={{background:'var(--bg2)',padding:'1px 5px',borderRadius:4}}>gas/+/usage</code> to subscribe all devices</div>
        </div>

        <div style={{display:'flex',gap:10,marginTop:4}}>
          <button className="btn btn-green btn-full" onClick={()=>onSave(form)}>⚡ Connect</button>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
        </div>

        <div style={{marginTop:16,padding:'12px',background:'var(--bg2)',borderRadius:10,fontSize:11,color:'var(--text2)',border:'1px solid var(--border)'}}>
          <strong style={{color:'var(--text)'}}>From your EMQX broker info:</strong><br/>
          Broker: tdf182ef.ala.asia-southeast1.emqxsl.com<br/>
          WSS Port: 8084 (TLS) &nbsp;•&nbsp; MQTT Port: 8883 (TLS)
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   LOGIN PAGE
═══════════════════════════════════════════════════════════════ */
function LoginPage({ onLogin }) {
  const [role, setRole]   = useState('customer');
  const [email, setEmail] = useState('');
  const [pass, setPass]   = useState('');
  const [err, setErr]     = useState('');
  const [loading, setLoading] = useState(false);

  const doLogin = () => {
    setErr(''); setLoading(true);
    setTimeout(() => {
      setLoading(false);
      if (role === 'admin') {
        if (email === ADMIN_DB.email && pass === ADMIN_DB.password) { onLogin(ADMIN_DB); return; }
        setErr('Invalid admin credentials.');
      } else {
        const u = USERS_DB.find(u => u.email === email && u.password === pass);
        if (u) { onLogin(u); return; }
        setErr('Invalid email or password.');
      }

  return (
    <div className="login-wrap">
      <div className="login-bg">
        <div className="login-grid"/>

        <div className="login-orb orb2"/>
        <div className="login-orb orb3"/>
      </div>
      <div className="login-card">
        <div className="login-logo">
          <div className="login-logo-icon">⛽</div>
          <div>
            <div className="login-logo-text">GasPulse</div>

        <div className="login-title">Welcome Back</div>
        <div className="login-sub">Sign in to your monitoring dashboard</div>

        <div className="role-tabs">

          <button className={`role-tab ${role==='admin'?'active':''}`}    onClick={()=>{setRole('admin');setErr('')}}>🛠️ Admin</button>
        </div>

        <div className="form-group">
          <label className="form-label">Email</label>

            value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doLogin()}/>
        </div>
        <div className="form-group">
          <label className="form-label">Password</label>

            value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doLogin()}/>

        {err && <div style={{color:'var(--red)',fontSize:13,marginBottom:14,padding:'10px 14px',background:'rgba(242,95,92,.1)',borderRadius:8,border:'1px solid rgba(242,95,92,.3)'}}>{err}</div>}

        <button className="btn-primary" onClick={doLogin} disabled={loading}>
          {loading ? <span className="spinner"/> : '→ Sign In'}
        </button>

        <div className="login-hint" style={{marginTop:18}}>
          <div style={{fontWeight:700,fontSize:10,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--text2)',marginBottom:6}}>Demo Credentials</div>
          {role === 'admin'
            ? <div>👤 <strong>admin@gaspulse.com</strong> &nbsp;🔑 <strong>admin123</strong></div>
            : <>
                <div>👤 <strong>arjun@example.com</strong> &nbsp;🔑 <strong>user123</strong></div>
                <div style={{marginTop:4}}>👤 <strong>priya@example.com</strong> &nbsp;🔑 <strong>user456</strong></div>
              </>
          }
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════

/* ═══════════════════════════════════════════════════════════════
   LIVE USAGE CHART COMPONENT (updates with new data)
═══════════════════════════════════════════════════════════════ */
function LiveChart({ messages, topic }) {
  const canvasRef = useRef();
  const chartRef  = useRef(null);

  // Derive last-20 data points for this topic
  const points = useMemo(() => {
    const filtered = messages.filter(m => m.topic === topic || !topic);
    return filtered.slice(0, 20).reverse();
  }, [messages, topic]);

  useEffect(() => {
    if (!canvasRef.current) return;
    const ctx = canvasRef.current.getContext('2d');

    if (chartRef.current) { chartRef.current.destroy(); }

    chartRef.current = new Chart(ctx, {
      type: 'line',
      data: {
        labels: points.map(p => fmtTime(p.ts)),
        datasets: [{
          label: 'Gas Usage (m³)',
          data:   points.map(p => p.m3),
          borderColor: '#22d07a',
          backgroundColor: 'rgba(34,208,122,0.08)',
          borderWidth: 2.5,
          pointBackgroundColor: '#22d07a',
          pointBorderColor: 'var(--bg)',
          pointBorderWidth: 2,
          pointRadius: 5,
          tension: 0.4,
          fill: true,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 400 },
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color:'rgba(99,179,237,0.07)' }, ticks: { color:'#8fa3c8', maxTicksLimit:8, font:{size:10} } },
          y: { grid: { color:'rgba(99,179,237,0.07)' }, ticks: { color:'#8fa3c8', font:{size:10} }, beginAtZero:true }
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [points]);

  if (points.length === 0) {
    return (
      <div className="empty-state" style={{padding:32}}>
        <div className="empty-icon">📭</div>
        <div className="empty-text">No Data Yet</div>
        <div className="empty-sub">Waiting for MQTT messages…</div>
      </div>
    );
  }

  return <div className="chart-wrap"><canvas ref={canvasRef}/></div>;
}

/* ═══════════════════════════════════════════════════════════════
   CUSTOMER DASHBOARD
═══════════════════════════════════════════════════════════════ */
function CustomerDashboard({ user, mqttData }) {
  const { status, messages, devices } = mqttData;

  // Only messages for this user's topic
  const myTopic    = user.topic || 'gas/user1/usage';
  const myMessages = messages.filter(m => m.topic === myTopic);
  const latest     = myMessages[0];

  const currentM3  = latest ? latest.m3   : null;
  const lastPulse  = latest ? latest.pulse : null;
  const lastSeen   = latest ? latest.ts    : null;

  // Session total = sum of unique readings (use simple accumulation)
  const sessionTotal = useMemo(() => {
    if (myMessages.length === 0) return 0;
    return myMessages.reduce((acc, m) => acc + m.m3, 0);
  }, [myMessages.length]);

  const isOnline = devices[myTopic]?.active ?? false;
  const hasData  = !!latest;

  return (
    <div className="page">
      {/* Connection alerts */}
      {status === 'disconnected' && (
        <div className="alert alert-warn fade-up">
          <span className="alert-icon">⚠️</span>
          <div>
            <div className="alert-title">MQTT Disconnected</div>
            <div className="alert-msg">Click ⚙️ MQTT in the top-bar to configure and connect.</div>
          </div>
        </div>
      )}
      {status === 'connected' && !hasData && (
        <div className="alert alert-info fade-up">
          <span className="alert-icon">📡</span>
          <div>
            <div className="alert-title">Connected — Waiting for data</div>
            <div className="alert-msg">Subscribed to <code style={{background:'var(--bg2)',padding:'0 4px',borderRadius:4}}>{myTopic}</code>. Waiting for ESP to send pulses…</div>
          </div>
        </div>
      )}

      {/* Stat cards */}
      <div className="stats-grid">
        <StatCard icon="⛽" label="Current Reading" value={hasData ? `${currentM3} m³` : '—'} change={hasData?`Pulse: ${lastPulse}`:'No data received'} dir={hasData?'up':'neutral'} accent="accent-green" glow="glow-green" delay="fade-up-1"/>
        <StatCard icon="📈" label="Session Total"   value={hasData ? `${sessionTotal.toFixed(2)} m³` : '—'} change={`${myMessages.length} readings`} dir="neutral" accent="accent-blue"   glow="glow-blue"   delay="fade-up-2"/>
        <StatCard icon="📡" label="Device Status"   value={isOnline ? 'Online' : (hasData ? 'Idle' : 'No Data')} change={hasData?`Last: ${fmtTime(lastSeen)}`:'Awaiting signal'} dir={isOnline?'up':'neutral'} accent={isOnline?'accent-green':'accent-orange'} glow={isOnline?'glow-green':'glow-orange'} delay="fade-up-3"/>
        <StatCard icon="🔗" label="Connection"      value={status==='connected'?'Live':status==='connecting'?'Connecting':'Offline'} change={`Topic: ${myTopic.split('/').slice(-2).join('/')}`} dir={status==='connected'?'up':status==='connecting'?'neutral':'down'} accent={status==='connected'?'accent-green':'accent-orange'} glow={status==='connected'?'glow-green':'glow-orange'} delay="fade-up-4"/>
      </div>

      {/* Main content */}
      <div className="grid-3">
        {/* Live chart */}
        <div className="card fade-up fade-up-2">
          <div className="card-header">
            <div>
              <div className="card-title">Live Usage Trend</div>
              <div className="card-sub">Gas consumption in m³ (last 20 readings)</div>
            </div>
            {hasData && <LiveBadge/>}
          </div>
          <LiveChart messages={messages} topic={myTopic}/>
        </div>

        {/* Right column */}
        <div style={{display:'flex',flexDirection:'column',gap:18}}>
          {/* Big number */}
          <div className="card fade-up fade-up-3">
            <div className="card-header">
              <div className="card-title">Current Reading</div>
              {hasData && <LiveBadge/>}
            </div>
            <div className="gas-hero" style={{padding:'20px 0'}}>
              <div className={`gas-num ${hasData?'live':'nodata'}`}>
                {hasData ? currentM3 : '—'}
              </div>
              <div className="gas-unit">m³</div>
              {lastPulse !== null && <div className="gas-ts">Pulse count: <span className="pulse-badge">{lastPulse}</span></div>}
              <div className="gas-ts" style={{marginTop:6}}>Last update: {fmtTime(lastSeen)}</div>
            </div>
          </div>

          {/* Connection info card */}
          <div className="card fade-up fade-up-4">
            <div className="card-title" style={{marginBottom:14}}>Device Info</div>
            {[
              { l:'Topic',  v: myTopic },
              { l:'Device', v: user.id },
              { l:'Status', v: isOnline?'🟢 Online':'⚫ Offline' },
              { l:'Readings', v: `${myMessages.length} total` },
            ].map((r,i) => (
              <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:i<3?'1px solid var(--border)':'none',fontSize:13}}>
                <span style={{color:'var(--text2)'}}>{r.l}</span>
                <span style={{fontWeight:500,maxWidth:'55%',textAlign:'right',wordBreak:'break-all'}}>{r.v}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Recent readings log */}
      <div className="card fade-up fade-up-5">
        <div className="card-header">
          <div><div className="card-title">Recent Readings</div><div className="card-sub">Last 50 MQTT messages</div></div>
          {hasData && <span style={{fontSize:12,color:'var(--text3)'}}>{myMessages.length} total</span>}
        </div>
        {myMessages.length === 0
          ? <div className="empty-state" style={{padding:28}}>
              <div className="empty-icon">📭</div>
              <div className="empty-text">No Data Received</div>
              <div className="empty-sub">Ensure your ESP is running and MQTT is connected</div>
            </div>
          : <div className="log-scroll">
              {myMessages.slice(0,50).map((m,i) => (
                <div key={i} className="log-row">
                  <div className="log-icon">⛽</div>
                  <div className="log-body">
                    <div className="log-title">{m.m3} m³</div>
                    <div className="log-time">{fmtDateTime(m.ts)} &nbsp;•&nbsp; Pulse: {m.pulse}</div>
                  </div>
                  <div className="log-val">{m.m3} m³</div>
                </div>
              ))}
            </div>
        }
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   CUSTOMER USAGE PAGE
═══════════════════════════════════════════════════════════════ */
function UsagePage({ user, mqttData }) {
  const { messages } = mqttData;
  const myTopic = user.topic || 'gas/user1/usage';
  const myMsgs  = messages.filter(m => m.topic === myTopic);
  const canvasRef = useRef();

  // Build hourly buckets from session data
  const hourlyData = useMemo(() => {
    const buckets = {};
    myMsgs.forEach(m => {
      const h = new Date(m.ts).getHours();
      const key = `${h}:00`;
      buckets[key] = (buckets[key] || 0) + m.m3;
    });
    return Object.entries(buckets).map(([h,v])=>({ hour:h, m3:parseFloat(v.toFixed(2)) })).slice(-12);
  }, [myMsgs.length]);

  useEffect(() => {
    if (!canvasRef.current || hourlyData.length === 0) return;
    const ctx = canvasRef.current.getContext('2d');
    const ch = new Chart(ctx, {
      type:'bar',
      data:{
        labels: hourlyData.map(d=>d.hour),
        datasets:[{
          label:'m³ per hour',
          data: hourlyData.map(d=>d.m3),
          backgroundColor: hourlyData.map(d=>d.m3>50?'rgba(249,115,22,.7)':'rgba(79,163,247,.7)'),
          borderColor:     hourlyData.map(d=>d.m3>50?'#f97316':'#4fa3f7'),
          borderWidth:1.5, borderRadius:7,
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          x:{grid:{display:false},ticks:{color:'#8fa3c8',font:{size:10}}},
          y:{grid:{color:'rgba(99,179,237,0.07)'},ticks:{color:'#8fa3c8',font:{size:10}},beginAtZero:true}
        }
      }
    });
    return () => ch.destroy();
  }, [hourlyData]);

  const totalM3 = myMsgs.reduce((a,m)=>a+m.m3,0).toFixed(2);
  const avgM3   = myMsgs.length ? (myMsgs.reduce((a,m)=>a+m.m3,0)/myMsgs.length).toFixed(2) : 0;
  const maxM3   = myMsgs.length ? Math.max(...myMsgs.map(m=>m.m3)).toFixed(2) : 0;

  return (
    <div className="page">
      <div className="stats-grid">
        <StatCard icon="📦" label="Session Total" value={`${totalM3} m³`} change={`${myMsgs.length} msgs`} dir="neutral" accent="accent-green" glow="glow-green" delay="fade-up-1"/>
        <StatCard icon="📊" label="Avg per Reading" value={`${avgM3} m³`} change="This session" dir="neutral" accent="accent-blue" glow="glow-blue" delay="fade-up-2"/>
        <StatCard icon="⚡" label="Peak Reading"   value={`${maxM3} m³`} change="Highest spike" dir="down" accent="accent-orange" glow="glow-orange" delay="fade-up-3"/>
        <StatCard icon="📨" label="Messages"       value={myMsgs.length} change={`Topic: ${myTopic}`} dir="neutral" accent="accent-blue" glow="glow-blue" delay="fade-up-4"/>
      </div>

      <div className="card fade-up fade-up-2" style={{marginBottom:20}}>
        <div className="card-header">
          <div><div className="card-title">Hourly Usage (m³)</div><div className="card-sub">Orange bars = high usage hours</div></div>
        </div>
        {hourlyData.length === 0
          ? <div className="empty-state" style={{padding:32}}><div className="empty-icon">📭</div><div className="empty-text">No Data Yet</div><div className="empty-sub">Connect MQTT and wait for readings</div></div>
          : <div className="chart-wrap"><canvas ref={canvasRef}/></div>
        }
      </div>

      <div className="card fade-up fade-up-3">
        <div className="card-header">
          <div><div className="card-title">Usage History</div><div className="card-sub">All received readings this session</div></div>
        </div>
        {myMsgs.length === 0
          ? <div className="empty-state" style={{padding:28}}><div className="empty-icon">📭</div><div className="empty-text">No Data</div><div className="empty-sub">No readings received yet</div></div>
          : <>
              <div className="table-wrap">
                <table>
                  <thead><tr><th>#</th><th>Time</th><th>Pulse Count</th><th>Gas Usage (m³)</th></tr></thead>
                  <tbody>
                    {myMsgs.slice(0,100).map((m,i)=>(
                      <tr key={i}>
                        <td style={{color:'var(--text3)',fontSize:11}}>{myMsgs.length-i}</td>
                        <td>{fmtDateTime(m.ts)}</td>
                        <td><span className="pulse-badge">{m.pulse}</span></td>
                        <td><strong style={{color:'var(--green)'}}>{m.m3} m³</strong></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {myMsgs.length > 100 && <div style={{textAlign:'center',padding:'14px',fontSize:12,color:'var(--text3)'}}>Showing 100 of {myMsgs.length} readings</div>}
            </>
        }
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   ADMIN OVERVIEW
═══════════════════════════════════════════════════════════════ */
function AdminOverview({ mqttData }) {
  const { status, messages, devices } = mqttData;
  const canvasRef = useRef();

  const activeDevices   = Object.values(devices).filter(d=>d.active);
  const totalDevices    = Object.keys(devices).length;
  const totalM3         = Object.values(devices).reduce((a,d)=>a+d.m3,0).toFixed(2);
  const totalMessages   = messages.length;

  // Per-topic totals for chart
  const topicTotals = useMemo(() => {
    const acc = {};
    messages.forEach(m => { acc[m.topic] = (acc[m.topic]||0) + m.m3; });
    return Object.entries(acc).map(([t,v])=>({ label:t.split('/').slice(0,-1).join('/'), m3:parseFloat(v.toFixed(2)) }));
  }, [messages.length]);

  useEffect(() => {
    if (!canvasRef.current || topicTotals.length === 0) return;
    const ctx = canvasRef.current.getContext('2d');
    const colors = ['rgba(34,208,122,.7)','rgba(79,163,247,.7)','rgba(249,115,22,.7)','rgba(242,95,92,.7)','rgba(168,85,247,.7)'];
    const ch = new Chart(ctx, {
      type:'bar',
      data:{
        labels: topicTotals.map(d=>d.label),
        datasets:[{ label:'Total m³', data:topicTotals.map(d=>d.m3), backgroundColor:colors, borderWidth:0, borderRadius:8 }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          x:{grid:{display:false},ticks:{color:'#8fa3c8',font:{size:10}}},
          y:{grid:{color:'rgba(99,179,237,0.07)'},ticks:{color:'#8fa3c8',font:{size:10}},beginAtZero:true}
        }
      }
    });
    return () => ch.destroy();
  }, [topicTotals]);

  return (
    <div className="page">
      {status === 'disconnected' && (
        <div className="alert alert-warn fade-up">
          <span className="alert-icon">⚠️</span>
          <div><div className="alert-title">MQTT Not Connected</div><div className="alert-msg">Click ⚙️ MQTT in the top bar to configure your broker.</div></div>
        </div>
      )}

      <div className="stats-grid">
        <StatCard icon="📡" label="Active Devices"  value={activeDevices.length} change={`${totalDevices} seen this session`} dir="up" accent="accent-blue"   glow="glow-blue"   delay="fade-up-1"/>
        <StatCard icon="⛽" label="Total Gas (m³)"  value={totalM3} change="All devices combined"  dir="neutral" accent="accent-green"  glow="glow-green"  delay="fade-up-2"/>
        <StatCard icon="📨" label="MQTT Messages"   value={totalMessages} change="This session"   dir="neutral" accent="accent-blue"   glow="glow-blue"   delay="fade-up-3"/>
        <StatCard icon="🔗" label="Broker Status"   value={status==='connected'?'Online':status==='connecting'?'Connecting':'Offline'} change="EMQX Cloud" dir={status==='connected'?'up':status==='connecting'?'neutral':'down'} accent={status==='connected'?'accent-green':'accent-orange'} glow={status==='connected'?'glow-green':'glow-orange'} delay="fade-up-4"/>
      </div>

      <div className="grid-2">
        <div className="card fade-up fade-up-1">
          <div className="card-header">
            <div><div className="card-title">Total Usage by Device</div><div className="card-sub">Aggregate m³ per topic</div></div>
          </div>
          {topicTotals.length === 0
            ? <div className="empty-state" style={{padding:32}}><div className="empty-icon">📡</div><div className="empty-text">No device data yet</div><div className="empty-sub">Connect MQTT to see device data</div></div>
            : <div className="chart-wrap"><canvas ref={canvasRef}/></div>
          }
        </div>

        <div className="card fade-up fade-up-2">
          <div className="card-title" style={{marginBottom:16}}>Device Summary</div>
          {totalDevices === 0
            ? <div className="empty-state" style={{padding:28}}><div className="empty-icon">🔌</div><div className="empty-text">No Devices</div><div className="empty-sub">Waiting for ESP connections</div></div>
            : Object.entries(devices).map(([topic, d],i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'11px 0',borderBottom:i<Object.keys(devices).length-1?'1px solid var(--border)':'none'}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:600}}>{topic}</div>
                    <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{fmtDateTime(d.ts)}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontFamily:'var(--font-head)',fontSize:16,fontWeight:700,color:'var(--green)'}}>{d.m3} m³</div>
                    <DeviceBadge active={d.active}/>
                  </div>
                </div>
              ))
          }
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   ADMIN DEVICES PAGE
═══════════════════════════════════════════════════════════════ */
function AdminDevices({ mqttData }) {
  const { messages, devices } = mqttData;
  const [search, setSearch]   = useState('');

  const rows = Object.entries(devices)
    .filter(([t]) => t.toLowerCase().includes(search.toLowerCase()))
    .map(([topic, d]) => {
      const topicMsgs  = messages.filter(m=>m.topic===topic);
      const totalM3    = topicMsgs.reduce((a,m)=>a+m.m3,0).toFixed(2);
      const readingCnt = topicMsgs.length;
      return { topic, ...d, totalM3, readingCnt };
    });

  return (
    <div className="page">
      <div className="stats-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
        <StatCard icon="📡" label="Total Seen"     value={Object.keys(devices).length} accent="accent-blue"   glow="glow-blue"   delay="fade-up-1"/>
        <StatCard icon="🟢" label="Online Now"     value={Object.values(devices).filter(d=>d.active).length}  accent="accent-green"  glow="glow-green"  delay="fade-up-2"/>
        <StatCard icon="⚫" label="Offline"        value={Object.values(devices).filter(d=>!d.active).length} accent="accent-orange" glow="glow-orange" delay="fade-up-3"/>
      </div>

      <div className="card fade-up fade-up-2">
        <div className="card-header" style={{flexWrap:'wrap',gap:10}}>
          <div><div className="card-title">Connected ESP Devices</div><div className="card-sub">All devices that sent data via MQTT</div></div>
          <input className="form-input" style={{width:220,padding:'8px 12px'}} placeholder="🔍 Filter by topic…"
            value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>

        {rows.length === 0
          ? <div className="empty-state" style={{padding:36}}>
              <div className="empty-icon">📡</div>
              <div className="empty-text">No Devices Found</div>
              <div className="empty-sub">Connect MQTT broker and wait for ESP devices to send pulse data</div>
            </div>
          : <div className="table-wrap">
              <table>
                <thead><tr><th>Topic / Device ID</th><th>Current Reading</th><th>Session Total</th><th>Messages</th><th>Last Seen</th><th>Status</th></tr></thead>
                <tbody>
                  {rows.map((r,i)=>(
                    <tr key={i}>
                      <td>
                        <div style={{fontWeight:600,fontSize:13}}>{r.topic}</div>
                        <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>Pulse → m³ ×{PULSE_TO_M3}</div>
                      </td>
                      <td><strong style={{color:'var(--green)',fontFamily:'var(--font-head)',fontSize:15}}>{r.m3} m³</strong><div style={{fontSize:10,color:'var(--text3)'}}>Pulse: {r.pulse}</div></td>
                      <td><strong>{r.totalM3} m³</strong></td>
                      <td><span className="pulse-badge">{r.readingCnt}</span></td>
                      <td style={{fontSize:12,color:'var(--text2)'}}>{fmtDateTime(r.ts)}</td>
                      <td><DeviceBadge active={r.active}/></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
        }
      </div>

      {/* Live message stream */}
      <div className="card fade-up fade-up-3">
        <div className="card-header">
          <div><div className="card-title">Live Message Stream</div><div className="card-sub">All MQTT messages across devices</div></div>
          {messages.length>0 && <LiveBadge/>}
        </div>
        {messages.length === 0
          ? <div className="empty-state" style={{padding:28}}><div className="empty-icon">📭</div><div className="empty-text">No messages yet</div></div>
          : <div className="log-scroll">
              {messages.slice(0,60).map((m,i)=>(
                <div key={i} className="log-row">
                  <div className="log-icon" style={{background:'var(--blue-glow)'}}>📨</div>
                  <div className="log-body">
                    <div className="log-title">{m.topic}</div>
                    <div className="log-time">{fmtDateTime(m.ts)}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div className="log-val">{m.m3} m³</div>
                    <div style={{fontSize:10,color:'var(--text3)'}}>pulse: {m.pulse}</div>
                  </div>
                </div>
              ))}
            </div>
        }
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════════ */
function App() {
  const [user,       setUser]      = useState(null);
  const [page,       setPage]      = useState(null);
  const [collapsed,  setCollapsed] = useState(false);
  const [mobileOpen, setMobileOpen]= useState(false);
  const [dark,       setDark]      = useState(true);
  const [mqttCfg,    setMqttCfg]   = useState(DEFAULT_MQTT);
  const [mqttEnabled,setMqttEnabled]= useState(false);
  const [showCfg,    setShowCfg]   = useState(false);

  // Central MQTT state shared across all pages
  const mqttData = useMQTT(mqttCfg, mqttEnabled);

  useEffect(() => {
    document.documentElement.className = dark ? '' : 'light';
  }, [dark]);

  const handleLogin = (u) => {
    setUser(u);
    setPage(u.role === 'admin' ? 'admin-overview' : 'dashboard');
    // Update default topic for customer
    if (u.topic) setMqttCfg(c=>({ ...c, topic: u.topic }));
  };

  const handleLogout = () => {
    setUser(null); setPage(null);
    setMqttEnabled(false);
  };

  const handleSaveCfg = (cfg) => {
    setMqttCfg(cfg);
    setMqttEnabled(true);
    setShowCfg(false);
  };

  if (!user) return <LoginPage onLogin={handleLogin}/>;

  const renderPage = () => {
    const props = { user, mqttData };
    if (user.role === 'admin') {
      if (page === 'admin-overview') return <AdminOverview {...props}/>;
      if (page === 'admin-devices')  return <AdminDevices  {...props}/>;
    } else {
      if (page === 'dashboard') return <CustomerDashboard {...props}/>;
      if (page === 'usage')     return <UsagePage {...props}/>;
    }
    return user.role === 'admin' ? <AdminOverview {...props}/> : <CustomerDashboard {...props}/>;
  };

  return (
    <div className="app-shell">
      <Sidebar
        user={user} page={page} setPage={setPage}
        collapsed={collapsed} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen}
        onLogout={handleLogout}
      />
      <div className={`main${collapsed?' collapsed':''}`}>
        <Topbar
          user={user} page={page}
          collapsed={collapsed} setCollapsed={setCollapsed}
          setMobileOpen={setMobileOpen}
          dark={dark} setDark={setDark}
          mqttStatus={mqttData.status}
          onOpenConfig={()=>setShowCfg(true)}
        />
        {renderPage()}
      </div>

      {/* MQTT Config Modal */}
      {showCfg && (
        <MqttConfigModal
          cfg={mqttCfg}
          onSave={handleSaveCfg}
          onClose={()=>setShowCfg(false)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
